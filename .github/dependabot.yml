# Dependabot: dependency update PRs (npm, Cargo/Tauri, GitHub Actions, Docker).
# Groups batch updates into one PR per ecosystem + directory (fewer noisy PRs).
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-monorepo:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      npm-desktop:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-tauri:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      docker:
        patterns:
          - "*"
    ignore:
      - dependency-name: node
        update-types: [version-update:semver-major]
