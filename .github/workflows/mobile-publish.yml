# Unsigned Android APK + AAB and iOS IPA, attached to the GitHub Release for tag v*.
# Triggered by Release workflow (same pattern as desktop-publish / docker-publish) or manually / tag push.
name: Mobile release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (e.g. v0.4.0)'
        required: true
        type: string

concurrency:
  group: mobile-release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  android:
    name: Android APK + AAB — ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - name: Build mobile Lexical embed (when script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['build:mobile-lexical'] ? 0 : 1)"; then
            npm run build:mobile-lexical
          else
            echo "Skipping build:mobile-lexical on this ref (use committed bluetasks_lexical assets)."
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: assembleRelease + bundleRelease (unsigned)
        working-directory: mobile
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease --no-daemon

      - name: Collect Android outputs
        run: |
          VERSION="${RELEASE_TAG#v}"
          OUT="$GITHUB_WORKSPACE/mobile-release-out"
          mkdir -p "$OUT"
          shopt -s nullglob
          apks=(mobile/composeApp/build/outputs/apk/release/*.apk)
          aabs=(mobile/composeApp/build/outputs/bundle/release/*.aab)
          if [ ${#apks[@]} -lt 1 ]; then
            echo "No release APK under composeApp/build/outputs/apk/release/"
            exit 1
          fi
          if [ ${#aabs[@]} -lt 1 ]; then
            echo "No release AAB under composeApp/build/outputs/bundle/release/"
            exit 1
          fi
          cp "${apks[0]}" "$OUT/BlueTasks_${VERSION}_android_unsigned.apk"
          cp "${aabs[0]}" "$OUT/BlueTasks_${VERSION}_android_unsigned.aab"
          (cd "$OUT" && sha256sum BlueTasks_${VERSION}_android_unsigned.apk BlueTasks_${VERSION}_android_unsigned.aab) > "$OUT/SHA256SUMS-android.txt"
          cat "$OUT/SHA256SUMS-android.txt"

      - uses: actions/upload-artifact@v7
        with:
          name: bluetasks-mobile-android
          path: mobile-release-out/

  ios-ipa:
    name: iOS IPA (unsigned) — ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      # mobile/gradle.properties caps the daemon at 2g; Kotlin/Native linkPodReleaseFrameworkIosArm64 OOMs on GHA macOS.
      - name: Raise Gradle heap for Kotlin/Native (this job only)
        working-directory: mobile
        run: perl -i -pe 's/^org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8/' gradle.properties && grep '^org.gradle.jvmargs=' gradle.properties

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - name: Build mobile Lexical embed (when script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['build:mobile-lexical'] ? 0 : 1)"; then
            npm run build:mobile-lexical
          else
            echo "Skipping build:mobile-lexical on this ref (use committed bluetasks_lexical assets)."
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: CocoaPods + KMP framework
        working-directory: mobile
        run: |
          ./gradlew :composeApp:generateDummyFramework --no-daemon
          cd iosApp && pod install

      - name: Xcode build (Release, iphoneos, no code signing)
        working-directory: mobile/iosApp
        run: |
          xcodebuild -workspace iosApp.xcworkspace -scheme iosApp -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package unsigned IPA
        run: |
          VERSION="${RELEASE_TAG#v}"
          APP=$(find mobile/iosApp/build/DerivedData -type d -name 'iosApp.app' -path '*Release-iphoneos*' | head -1)
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "iosApp.app (Release-iphoneos) not found"
            find mobile/iosApp/build/DerivedData -name '*.app' -type d 2>/dev/null || true
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/ios-ipa-out/Payload"
          ditto "$APP" "$GITHUB_WORKSPACE/ios-ipa-out/Payload/iosApp.app"
          cd "$GITHUB_WORKSPACE/ios-ipa-out"
          zip -qr "BlueTasks_${VERSION}_ios_unsigned.ipa" Payload
          rm -rf Payload
          shasum -a 256 "BlueTasks_${VERSION}_ios_unsigned.ipa" > SHA256SUMS-ios-ipa.txt
          cat SHA256SUMS-ios-ipa.txt

      - uses: actions/upload-artifact@v7
        with:
          name: bluetasks-mobile-ios
          path: ios-ipa-out/

  publish:
    name: Publish GitHub Release assets (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }})
    needs: [android, ios-ipa]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: bluetasks-mobile-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f -print

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: BlueTasks ${{ env.RELEASE_TAG }}
          allowUpdates: true
          make_latest: false
          fail_on_unmatched_files: false
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
