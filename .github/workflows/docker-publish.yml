# Build JS on the runner, then copy artifacts into `.dockerctx/` (no npm in the final image layer).
# Trigger: tag push `v*` or manual `workflow_dispatch` (pushes to GHCR with the given tag).
name: Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v0.2.0-rc1). Creates :tag, :tag-amd64, :tag-arm64, and :latest."
        required: true
        type: string

concurrency:
  group: docker-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Image (${{ matrix.slug }})
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - slug: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (dev + prod)
        run: npm ci

      - name: Production build (Vite + server tsc)
        run: npm run build

      - name: Assemble Docker context (no node_modules)
        run: bash scripts/assemble-docker-context.sh

      - name: Image name (lowercase)
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .dockerctx
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.meta.outputs.image }}:${{ env.IMAGE_TAG }}-${{ matrix.slug }}
          cache-from: type=gha,scope=bluetasks-ctx-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=bluetasks-ctx-${{ matrix.slug }}

  merge:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Image name (lowercase)
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version tag and latest manifest
        run: |
          IMG="${{ steps.meta.outputs.image }}"
          R="${IMAGE_TAG}"
          docker buildx imagetools create -t "${IMG}:${R}" \
            "${IMG}:${R}-amd64" \
            "${IMG}:${R}-arm64"
          docker buildx imagetools create -t "${IMG}:latest" \
            "${IMG}:${R}-amd64" \
            "${IMG}:${R}-arm64"
