# Build JS, assemble .dockerctx/, and verify the image builds for linux/amd64 (no push).
name: Docker build check

on:
  pull_request:
    paths: &docker-check-paths
      - "Dockerfile"
      - "docker-compose.yml"
      - "scripts/assemble-docker-context.sh"
      - "scripts/bundle-server-docker.mjs"
      - "scripts/docker-appPaths-stub.cjs"
      - "scripts/docker-prune-native-deps.mjs"
      - "package.json"
      - "package-lock.json"
      - "server/**"
      - "web/**"
      - ".github/workflows/docker-build-check.yml"
  # Badge + default-branch status need a run on main (PR-only workflows show "no status").
  push:
    branches: [main, master]
    paths: *docker-check-paths
  workflow_dispatch:

concurrency:
  group: docker-build-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Verify Docker build (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and assemble Docker context
        run: npm run package:docker

      - uses: docker/setup-buildx-action@v4

      - name: Docker build (load amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f .dockerctx/Dockerfile \
            -t bluetasks:build-check \
            --load \
            .dockerctx
