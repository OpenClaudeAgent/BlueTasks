# Standalone: unsigned Android AAB + iOS Release simulator .app zip, attached to an existing GitHub Release for tag v*.
# Not wired into CI or the Release workflow — run manually from Actions when you want mobile assets.
# See docs/mobile-release-ci-plan.md.
name: Mobile artifacts (unsigned)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag (e.g. v0.3.4)'
        required: true
        type: string

concurrency:
  group: mobile-artifacts-unsigned-${{ github.event.inputs.tag }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag }}

jobs:
  android-bundle:
    name: Android AAB — ${{ github.event.inputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - name: Build mobile Lexical embed (when script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['build:mobile-lexical'] ? 0 : 1)"; then
            npm run build:mobile-lexical
          else
            echo "Skipping build:mobile-lexical on this ref (use committed bluetasks_lexical assets)."
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: Bundle release (unsigned AAB)
        working-directory: mobile
        run: ./gradlew :composeApp:bundleRelease --no-daemon

      - name: Collect Android outputs
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p "$GITHUB_WORKSPACE/mobile-release-out"
          shopt -s nullglob
          for f in mobile/composeApp/build/outputs/bundle/release/*.aab; do
            base=$(basename "$f")
            cp "$f" "$GITHUB_WORKSPACE/mobile-release-out/BlueTasks_${VERSION}_${base}"
          done
          test "$(find "$GITHUB_WORKSPACE/mobile-release-out" -name '*.aab' | wc -l)" -ge 1
          (cd "$GITHUB_WORKSPACE/mobile-release-out" && sha256sum *.aab) > "$GITHUB_WORKSPACE/mobile-release-out/SHA256SUMS-android-aab.txt"
          cat "$GITHUB_WORKSPACE/mobile-release-out/SHA256SUMS-android-aab.txt"

      - uses: actions/upload-artifact@v7
        with:
          name: bluetasks-android-release
          path: mobile-release-out/

  ios-simulator:
    name: iOS Release (simulator) — ${{ github.event.inputs.tag }}
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - name: Build mobile Lexical embed (when script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['build:mobile-lexical'] ? 0 : 1)"; then
            npm run build:mobile-lexical
          else
            echo "Skipping build:mobile-lexical on this ref (use committed bluetasks_lexical assets)."
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: CocoaPods + KMP framework
        working-directory: mobile
        run: |
          ./gradlew :composeApp:generateDummyFramework --no-daemon
          cd iosApp && pod install

      - name: Xcode build (Release, iOS Simulator)
        working-directory: mobile/iosApp
        run: |
          xcodebuild -workspace iosApp.xcworkspace -scheme iosApp -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./build/DerivedData \
            build

      - name: Zip simulator app
        run: |
          VERSION="${RELEASE_TAG#v}"
          APP=$(find mobile/iosApp/build/DerivedData -type d -name 'iosApp.app' -path '*Release-iphonesimulator*' | head -1)
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "iosApp.app (Release-iphonesimulator) not found"
            find mobile/iosApp/build/DerivedData -name '*.app' -type d 2>/dev/null || true
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/ios-release-out"
          ditto -c -k --keepParent "$APP" "$GITHUB_WORKSPACE/ios-release-out/BlueTasks_${VERSION}_ios_simulator.app.zip"
          shasum -a 256 "$GITHUB_WORKSPACE/ios-release-out/BlueTasks_${VERSION}_ios_simulator.app.zip" \
            > "$GITHUB_WORKSPACE/ios-release-out/SHA256SUMS-ios-simulator.txt"
          cat "$GITHUB_WORKSPACE/ios-release-out/SHA256SUMS-ios-simulator.txt"

      - uses: actions/upload-artifact@v7
        with:
          name: bluetasks-ios-simulator
          path: ios-release-out/

  publish:
    name: Publish GitHub Release assets (${{ github.event.inputs.tag }})
    needs: [android-bundle, ios-simulator]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: bluetasks-android-release
          path: release-assets
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: bluetasks-ios-simulator
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f -print

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: BlueTasks ${{ env.RELEASE_TAG }}
          allowUpdates: true
          make_latest: false
          fail_on_unmatched_files: false
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
