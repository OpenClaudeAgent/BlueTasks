# Quality gates mirror `npm run ci` pieces, each as its own job for clear Actions output.
# Any failing step exits non-zero → that job fails → the workflow run is red (unless a step sets continue-on-error).
# Desktop (Tauri) bundles are built only on release — see desktop-publish.yml (not in this workflow).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run format:check

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint:markdown

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: npm run lint:shell

  knip:
    name: Knip
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run knip

  audit:
    name: npm audit (production, high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run audit:prod

  clippy:
    name: Clippy (desktop Tauri)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux / Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config
      - name: Stub Tauri resources (real tree comes from desktop:prep; glob must match in CI)
        run: |
          mkdir -p resources/bluetasks-runtime resources/node
          printf 'ci-stub\n' > resources/bluetasks-runtime/.ci-stub
          printf 'ci-stub\n' > resources/node/.ci-stub
      - run: cargo clippy --all-targets -- -D warnings

  eslint-web:
    name: ESLint (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-web

  stylelint:
    name: Stylelint (web CSS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint:stylelint

  eslint-server:
    name: ESLint (server)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-server

  eslint-e2e:
    name: ESLint (Playwright e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-e2e

  eslint-tooling:
    name: ESLint (contract, scripts, Playwright config)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-tooling

  jscpd:
    name: Duplication (jscpd)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run duplicates

  semgrep:
    name: Semgrep (full web/app + server + contract + e2e + scripts + root configs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src semgrep/semgrep sh -c \
            'semgrep scan --config p/typescript --config p/react --error web/app && \
             semgrep scan --config p/typescript --config p/security-audit --error server && \
             semgrep scan --config p/typescript --error contract e2e scripts playwright.config.ts eslint.tooling.config.mjs eslint.e2e.config.mjs'

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Tests with coverage gate (≥80% lines/statements/funcs, ≥75% branches web)
        run: npm run test:coverage:gate
      - name: Upload web coverage (gate scope)
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: coverage-web-gate
          path: web/app/coverage-gate
          if-no-files-found: ignore
      - name: Upload server coverage (gate scope)
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: coverage-server-gate
          path: server/coverage-gate
          if-no-files-found: ignore

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E tests (Playwright ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run Playwright (e2e shard)
        env:
          CI: 'true'
        run: npx playwright test --shard=${{ matrix.shard }}/2
