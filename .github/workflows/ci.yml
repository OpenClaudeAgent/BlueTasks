# Quality gates mirror `npm run ci` pieces, each as its own job for clear Actions output.
# Any failing step exits non-zero → that job fails → the workflow run is red (unless a step sets continue-on-error).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint-web:
    name: ESLint (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-web

  stylelint:
    name: Stylelint (web CSS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint:stylelint

  eslint-server:
    name: ESLint (server)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-server

  eslint-scenario:
    name: ESLint (Playwright scenario)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-scenario

  eslint-tooling:
    name: ESLint (contract, scripts, Playwright config)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint-tooling

  jscpd:
    name: Duplication (jscpd)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run duplicates

  semgrep:
    name: Semgrep (full web/app + server + contract + scenario + scripts + root configs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src semgrep/semgrep sh -c \
            'semgrep scan --config p/typescript --config p/react --error web/app && \
             semgrep scan --config p/typescript --error server contract scenario scripts playwright.config.ts eslint.tooling.config.mjs eslint.scenario.config.mjs'

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Tests with coverage gate (≥80%)
        run: npm run test:coverage:gate
      - name: Upload web coverage (gate scope)
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: coverage-web-gate
          path: web/app/coverage-gate
          if-no-files-found: ignore
      - name: Upload server coverage (gate scope)
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: coverage-server-gate
          path: server/coverage-gate
          if-no-files-found: ignore

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build

  scenario:
    name: Scenario tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run Playwright (scenario)
        env:
          CI: "true"
        run: npm run test:scenario
