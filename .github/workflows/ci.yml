name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & duplicates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint (web + server)
        run: npm run lint

      - name: Duplication scan (jscpd)
        run: npm run duplicates

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-web
          path: web/app/coverage
          if-no-files-found: ignore

      - name: Upload server coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-server
          path: server/coverage
          if-no-files-found: ignore

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
