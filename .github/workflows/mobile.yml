# Optional: run only when you click "Run workflow" (no automatic CI minutes on every PR).
name: Mobile (manual)

on:
  workflow_dispatch:

jobs:
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Build mobile Lexical WebView bundle
        working-directory: ${{ github.workspace }}
        run: npm ci && npm run build:mobile-lexical
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Quality gate + debug APK
        run: ./gradlew qualityGate :composeApp:assembleDebug --no-daemon
