# Data: host ./.data → container /app/.data (bluetasks.sqlite).
# Before first build: npm run docker:release  (generates .dockerctx/ + prod deps).
# GHCR image: replace build with image: ghcr.io/<owner>/bluetasks:<tag>
services:
  bluetasks:
    build:
      context: .dockerctx
    ports:
      - "8787:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
    # SQLite on the host: ./.data/bluetasks.sqlite (easy to back up)
    volumes:
      - ./.data:/app/.data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/tasks').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
